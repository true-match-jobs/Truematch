    <style>
      html,

      .bootstrap-loader {

        z-index: 9999;
        display: flex;
        align-items: center;

        border-radius: 9999px;
        border: 2px solid #52525b;
        border-top-color: #f4f4f5;
        animation: bootstrap-spin 0.9s linear infinite;
      }

      @keyframes bootstrap-spin {
        to {

        }
      }
