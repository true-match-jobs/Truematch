[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # VITE_* variables are intentionally exposed in browser bundles.
  SECRETS_SCAN_OMIT_KEYS = "VITE_API_BASE_URL,VITE_WS_BASE_URL,VITE_SITE_URL"

# API proxy redirects
[[redirects]]
  from = "/api/*"
  to = "https://true-match-consultancy.onrender.com/api/:splat"
  status = 200

# WebSocket redirect
[[redirects]]
  from = "/ws"
  to = "wss://true-match-consultancy.onrender.com/ws"
  status = 200

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache control for assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache control for index
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Cache control for service workers and manifest
[[headers]]
  for = "/site.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"
