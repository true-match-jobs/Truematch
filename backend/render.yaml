services:
  - type: web
    name: truematch-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npm run build && npm run prisma:migrate:deploy
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: FRONTEND_ORIGIN
        value: https://precious-valkyrie-0e8095.netlify.app
      # SECURITY: Set these in Render Dashboard → Environment → Secret Files
      # Never commit actual secret values to version control
      - key: DATABASE_URL
        sync: false  # Set in Render dashboard
      - key: JWT_ACCESS_SECRET
        sync: false  # Set in Render dashboard
      - key: JWT_REFRESH_SECRET
        sync: false  # Set in Render dashboard
      - key: ACCESS_TOKEN_EXPIRES_IN
        value: 15m
      - key: REFRESH_TOKEN_EXPIRES_IN
        value: 7d
      - key: SMTP_HOST
        value: smtp.zoho.com
      - key: SMTP_PORT
        value: 465
      - key: SMTP_USER
        value: noreply@truematch.chat
      - key: SMTP_PASS
        sync: false  # Set in Render dashboard
      - key: SMTP_FROM_EMAIL
        value: noreply@truematch.chat
      - key: SMTP_FROM_NAME
        value: TrueMatch
      - key: EMAIL_VERIFICATION_TOKEN_EXPIRES_HOURS
        value: 720
      - key: EMAIL_VERIFICATION_RESEND_COOLDOWN_SECONDS
        value: 60
      - key: CLOUDINARY_CLOUD_NAME
        value: dykntxvyw
      - key: CLOUDINARY_API_KEY
        sync: false  # Set in Render dashboard
      - key: CLOUDINARY_API_SECRET
        sync: false  # Set in Render dashboard
